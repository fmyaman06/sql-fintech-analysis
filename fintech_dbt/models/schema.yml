version: 2

models:
  - name: musteri_ozet
    description: "Müşteri bazında işlem özeti"
    columns:
      - name: musteri_id
        description: "Müşteri ID"
        tests:
          - not_null
          - unique
      - name: toplam_tutar
        description: "Toplam işlem tutarı"
        tests:
          - not_null

  - name: kategori_analiz
    description: "Kategori bazında risk analizi"
    columns:
      - name: kategori
        description: "İşlem kategorisi"
        tests:
          - not_null
          - unique